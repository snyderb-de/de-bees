<!doctype html><html><head><meta charset="utf-8"><style>
  *{margin:0;box-sizing:border-box}
  body{width:1080px;height:820px;font-family:"Avenir Next",sans-serif;overflow:hidden;position:relative;background:linear-gradient(#dff0f4 0%,#e8f3df 55%,#cfe3b6 100%)}
  .cap{position:absolute;left:18px;bottom:14px;font:600 12px/1 "Avenir Next";color:#39512a;background:#f6d65b;padding:7px 12px;border-radius:20px;z-index:9}
  .sun{position:absolute;right:90px;top:60px;width:120px;height:120px;border-radius:50%;background:radial-gradient(#fff1ad,#f6d65b);box-shadow:0 0 60px #f6d65b88}
  .hills{position:absolute;left:0;bottom:0;width:1080px;height:300px}
  .bar{position:relative;display:flex;align-items:center;justify-content:space-between;padding:30px 56px;z-index:5}
  .wm{font:700 24px "Bradley Hand","Marker Felt";color:#39512a}
  .nav a{font:600 14px "Avenir Next";color:#4a6a33;margin-left:20px}
  .hero{position:relative;text-align:center;padding:40px 60px;z-index:5}
  h1{font:400 70px/1 "Marker Felt","Bradley Hand";color:#2f4720;text-shadow:2px 3px 0 #ffffff80}
  h1 span{color:#e0922a}
  .lede{max-width:560px;margin:24px auto 0;font:500 19px/1.5 "Avenir Next";color:#3e5a2c}
  .cta{margin-top:30px}
  .cta a{font:700 15px "Bradley Hand";padding:15px 30px;border-radius:40px;background:#e0922a;color:#fff;box-shadow:0 5px 0 #b16f1d}
  .flowers{position:absolute;bottom:30px;width:1080px;text-align:center;font-size:38px;letter-spacing:18px;z-index:6}
  .bee2{position:absolute;left:160px;top:230px;font-size:40px;transform:rotate(8deg)}
</style></head><body>
  <div class="sun"></div>
  <svg class="hills" viewBox="0 0 1080 300" preserveAspectRatio="none"><path d="M0,120 C220,60 360,160 560,120 C760,80 880,170 1080,110 L1080,300 L0,300Z" fill="#bcd99a"/><path d="M0,190 C260,140 420,220 640,180 C820,150 940,210 1080,180 L1080,300 L0,300Z" fill="#9cc473"/></svg>
  <div class="bar"><div class="wm">🐝 The Apiary Ledger of Delaware</div><div class="nav"><a>Register</a><a>Map</a><a>Learn</a><a>Get Listed</a></div></div>
  <div class="bee2">🐝</div>
  <div class="hero">
    <h1>Where the <span>wildflowers</span><br>and the keepers are.</h1>
    <p class="lede">A storybook map of every Delaware apiary — follow the bloom from the Piedmont woods to the Sussex coast.</p>
    <div class="cta"><a>Wander the map →</a></div>
  </div>
  <div class="flowers">🌼🌻🌸🌼🌻</div>
  <div class="cap">SET A · COZY · 2 — Storybook Meadow</div>
</body></html>
